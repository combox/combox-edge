<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Технические работы</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #4b5563;
      --accent: #c2410c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #fff8f2, var(--bg) 45%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(860px, 100%);
      background: var(--card);
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
      text-align: center;
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.1;
      color: var(--accent);
    }
    p {
      margin: 0 auto;
      max-width: 58ch;
      color: var(--muted);
      font-size: clamp(15px, 2vw, 18px);
      line-height: 1.5;
    }
    img {
      margin-top: 22px;
      width: min(720px, 100%);
      height: auto;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Идут технические работы</h1>
    <p>Сервисы `app` и `api` временно недоступны. Пожалуйста, попробуйте зайти позже.</p>
    <img src="/maintenance/tech-rabota.jpg" alt="Технические работы" />
  </main>
</body>
</html>
